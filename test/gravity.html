<!DOCTYPE html>
<html lang="en" style="height: 100%;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引力</title>
    <script src="cursor.js"></script>
</head>

<body
    style="background-color: black;display: flex;align-items: center;justify-content: center;height: 100%;width: 100%;margin: 0;padding: 0;">
    <div class="a" style="width: 100px;height: 100px;background-color: white;border-radius: 50%;"></div>
    <div
        style="width: 100px;height: 100px;background-color: red;border-radius: 50%;position: fixed;top: 50%;left: 50%; transform: translate(-50%, -50%);z-index: -1;">
    </div>
    <script></script>

    <script>
        $cursor.registerEffect('gravitySpring', {
            type: 'global',

            init(element, options) {
                return {
                    // 力参数
                    grav: options.grav ?? 0.5,      // 引力强度
                    spring: options.spring ?? 0.1,  // 弹力刚度

                    // 精度控制
                    precision: options.precision ?? 3,  // 牛顿迭代次数（1-5足够）

                    // 边界处理
                    minDist: options.minDist ?? 1,  // 最小引力距离，防奇点

                    // 当前状态
                    currentX: 0,
                    currentY: 0,
                    centerX: 0,
                    centerY: 0,
                    isActive: false
                };
            },

            destroy(data, element) {
                // 清理：重置transform
                element.style.transform = '';
                data.isActive = false;
            },

            update(data, mouseX, mouseY, event, element) {
                // 首次或resize后重新计算元素中心
                if (!data.isActive || data._needsRecalc) {
                    const rect = element.getBoundingClientRect();
                    data.centerX = rect.left + rect.width / 2;
                    data.centerY = rect.top + rect.height / 2;
                    data.isActive = true;
                    data._needsRecalc = false;
                }

                // 计算稳定平衡点
                const { x, y } = getStablePoint(
                    mouseX, mouseY,
                    data.centerX, data.centerY,
                    data.grav,
                    data.spring,
                    data.minDist,
                    data.precision
                );

                // 应用transform（使用will-change提升性能）
                if (x !== data.currentX || y !== data.currentY) {
                    data.currentX = x;
                    data.currentY = y;
                    element.style.transform = `translate(${x}px, ${y}px)`;
                }
            },

            onVisibilityChange(data, visible, element) {
                if (visible) {
                    // 重新可见时标记需要重算中心位置
                    data._needsRecalc = true;
                } else {
                    // 不可见时可选地重置位置
                    element.style.transform = 'translate(0px, 0px)';
                    data.currentX = 0;
                    data.currentY = 0;
                }
            }
        });

        /**
         * 计算引力+弹力系统的稳定平衡点
         * @param {number} mx - 鼠标X (clientX)
         * @param {number} my - 鼠标Y (clientY)
         * @param {number} ox - 元素原始中心X
         * @param {number} oy - 元素原始中心Y
         * @param {number} grav - 引力强度
         * @param {number} spring - 弹力刚度
         * @param {number} minDist - 最小引力距离
         * @param {number} iterations - 牛顿迭代次数
         * @returns {{x: number, y: number}}
         */
        function getStablePoint(mx, my, ox, oy, grav, spring, minDist, iterations) {
            const dx0 = mx - ox;
            const dy0 = my - oy;
            const D = Math.hypot(dx0, dy0);

            // 鼠标在元素中心，无位移
            if (D < 0.001) return { x: 0, y: 0 };

            // 无量纲参数
            const K = grav / (spring * D * D * D);
            const maxK = 4 / 27;  // t(1-t)²的最大值，对应稳定边界

            let t;

            if (K >= maxK) {
                // 引力过强，无稳定平衡点，拉到minDist处
                t = 1 - minDist / D;
                t = Math.max(0, Math.min(1, t));
            } else {
                // 牛顿法求解 t(1-t)² = K，取t∈[0, ⅓]的稳定根
                // 初始猜测：小K时t≈K，大K时接近但不超过1/3
                t = K < 0.1 ? K : 0.25;

                for (let i = 0; i < iterations; i++) {
                    const one_minus_t = 1 - t;
                    const f = t * one_minus_t * one_minus_t - K;
                    const df = one_minus_t * (1 - 3 * t);

                    // 防止除以零（在t=1时）
                    if (Math.abs(df) < 1e-10) break;

                    const delta = f / df;
                    t -= delta;

                    // 早停：变化足够小
                    if (Math.abs(delta) < 1e-8) break;
                }

                // 钳制在稳定域
                t = Math.max(0, Math.min(1 / 3, t));
            }

            return {
                x: t * dx0,
                y: t * dy0
            };
        }


        $cursor.query('.a').addEffect('gravitySpring', {
            grav: 10000,    // 引力参数
            spring: 0.005,  // 弹力参数
            precision: 5,   // 计算精度
            minDist: 10     // 最小距离(px)
        });
    </script>
</body>

</html>
